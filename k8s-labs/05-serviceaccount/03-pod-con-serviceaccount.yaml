---
# Pod que usa el ServiceAccount y llama a la API de Kubernetes
# El token del SA se monta automáticamente en:
#   /var/run/secrets/kubernetes.io/serviceaccount/token
apiVersion: v1
kind: Pod
metadata:
  name: pod-api-caller
  namespace: bootcamp
spec:
  serviceAccountName: app-serviceaccount
  containers:
    - name: app
      image: curlimages/curl:8.5.0
      command: ["/bin/sh", "-c"]
      args:
        - |
          # Leer el token del ServiceAccount
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

          echo "=== Llamando a la API de Kubernetes ==="
          echo "Namespace actual: $NAMESPACE"
          echo ""

          # Listar pods en el namespace (el SA tiene permiso de 'list pods')
          echo "--- Pods en el namespace $NAMESPACE ---"
          curl -s \
            --cacert $CACERT \
            -H "Authorization: Bearer $TOKEN" \
            https://kubernetes.default.svc/api/v1/namespaces/$NAMESPACE/pods \
            | grep '"name"' | head -10

          echo ""
          echo "=== Token del ServiceAccount (primeros 50 chars) ==="
          echo "${TOKEN:0:50}..."

          sleep 3600
