---
# TEORIA: ServiceAccount es la identidad de un Pod dentro del cluster.
# Todo Pod tiene un ServiceAccount (por defecto usa "default").
# Con RBAC se definen los permisos que tiene ese ServiceAccount.
# Útil para: apps que necesitan llamar a la API de Kubernetes (operadores, CI/CD, etc.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-serviceaccount
  namespace: bootcamp
  labels:
    app: bootcamp
automountServiceAccountToken: true
