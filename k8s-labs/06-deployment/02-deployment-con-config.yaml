---
# Deployment completo: usa ConfigMap, Secret y ServiceAccount
# Este es el patrón real que se usa en producción
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-config
  namespace: bootcamp
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  APP_LOG_LEVEL: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: webapp-secret
  namespace: bootcamp
type: Opaque
data:
  API_KEY: c3VwZXItc2VjcmV0LWtleQ==   # super-secret-key en base64

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment
  namespace: bootcamp
  labels:
    app: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      serviceAccountName: app-serviceaccount   # SA del lab anterior (opcional)
      containers:
        - name: webapp
          image: nginx:1.25
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: webapp-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: webapp-secret
                  key: API_KEY
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
