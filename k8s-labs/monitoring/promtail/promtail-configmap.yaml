apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.monitoring.svc:3100/loki/api/v1/push

    scrape_configs:
      # ── Recolectar logs de TODOS los pods del cluster ──────────────────
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          # Detectar si el log es JSON y parsear campos
          - match:
              selector: '{namespace=~".+"}'
              stages:
                - json:
                    expressions:
                      level: level
                      msg: msg
                      traceID: traceID      # enlace con Tempo si la app lo emite
                - labels:
                    level:
                    traceID:
        relabel_configs:
          # Nodo donde corre el pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          # Propagar todos los labels del pod como labels de Loki
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          # job = namespace/pod-name
          - action: replace
            replacement: $1
            separator: /
            source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_pod_name
            target_label: job
          # Labels individuales
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Ruta del archivo de log (formato containerd)
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
