apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      log_level: warn

    distributor:
      receivers:
        # OTLP (OpenTelemetry) — estándar moderno
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        # Jaeger — compatible con apps Java, Tekton Pipelines
        jaeger:
          protocols:
            thrift_http:
              endpoint: 0.0.0.0:14268
            grpc:
              endpoint: 0.0.0.0:14250
        # Zipkin — compatible con Spring Boot, Istio
        zipkin:
          endpoint: 0.0.0.0:9411

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 48h           # conservar trazas 2 días

    storage:
      trace:
        backend: local
        wal:
          path: /tempo/wal
        local:
          path: /tempo/blocks

    # Generar métricas de trazas → aparecen en Prometheus
    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: k8s-bootcamp
      storage:
        path: /tempo/generator/wal
        remote_write:
          - url: http://prometheus.monitoring.svc:9090/api/v1/write
            send_exemplars: true
      processors:
        - service-graphs
        - span-metrics

    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
