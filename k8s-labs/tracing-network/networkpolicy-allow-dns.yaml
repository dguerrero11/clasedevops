# CRITICO: Sin esta policy los pods no pueden resolver nombres DNS
# Aplicar siempre que haya un default-deny-all activo
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: default
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
