---
# PATRON: Sidecar
# Un Pod con 2 contenedores que comparten el mismo volumen.
# El contenedor "app" escribe logs, el "sidecar" los lee y los envía.
# Ambos comparten red: pueden comunicarse via localhost.
apiVersion: v1
kind: Pod
metadata:
  name: pod-sidecar
  namespace: bootcamp
  labels:
    app: sidecar-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
            echo "$(date): log de la app" >> /var/log/app.log
            sleep 5
          done
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log

    - name: sidecar-log-reader
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          tail -f /var/log/app.log
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log

  volumes:
    - name: shared-logs
      emptyDir: {}
