---
# PVC con StorageClass → aprovisionamiento DINÁMICO
# No se necesita crear el PV manualmente
# El CSI Driver crea el PV y el subdirectorio NFS automáticamente:
#   /srv/nfs/k8s-storage/bootcamp/pvc-dinamico/
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-dinamico
  namespace: bootcamp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Mi
  storageClassName: nfs-csi
