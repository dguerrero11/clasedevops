---
# Secret inyectado como variables de entorno
# Kubernetes decodifica automáticamente el base64 al inyectarlo
apiVersion: v1
kind: Pod
metadata:
  name: pod-con-secret
  namespace: bootcamp
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "=== Credenciales disponibles ==="
          echo "Usuario: $DB_USER"
          echo "Host: $DB_HOST:$DB_PORT"
          echo "Password: [OCULTO - no imprimir en prod!]"
          # En producción NUNCA imprimir la contraseña en logs
          sleep 3600
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PORT
