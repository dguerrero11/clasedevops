---
# TEORIA: Secret es similar a ConfigMap pero para datos sensibles.
# Los valores en YAML deben estar en BASE64 (no es cifrado, es encoding).
# En producción usar: Sealed Secrets, External Secrets, Vault, etc.
#
# Generar base64:
#   echo -n "mi-password" | base64
#   echo -n "admin" | base64
#
# Decodificar:
#   echo "bWktcGFzc3dvcmQ=" | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: bootcamp
  labels:
    app: database
type: Opaque
data:
  # admin → YWRtaW4=
  DB_USER: YWRtaW4=
  # mi-password → bWktcGFzc3dvcmQ=
  DB_PASSWORD: bWktcGFzc3dvcmQ=
  # localhost → bG9jYWxob3N0
  DB_HOST: bG9jYWxob3N0
  # 5432 → NTQzMg==
  DB_PORT: NTQzMg==
