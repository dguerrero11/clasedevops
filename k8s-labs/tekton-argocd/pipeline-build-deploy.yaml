apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: build-and-deploy
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      description: URL del repositorio Git
      type: string
    - name: revision
      description: Branch o tag a construir
      type: string
      default: main
    - name: image
      description: "Imagen destino con tag. Ejemplo: usuario/mi-tienda:v1"
      type: string
  workspaces:
    - name: shared-source
      description: Workspace compartido entre las Tasks
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: source
          workspace: shared-source

    - name: build-push
      taskRef:
        name: build-push
      runAfter:
        - clone
      params:
        - name: image
          value: $(params.image)
        - name: context
          value: app
      workspaces:
        - name: source
          workspace: shared-source
        - name: docker-credentials
          workspace: shared-source
