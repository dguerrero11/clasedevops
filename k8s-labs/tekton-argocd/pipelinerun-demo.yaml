# Lanzar con: kubectl apply -f pipelinerun-demo.yaml
# Ver logs:   tkn pipelinerun logs --last -f -n tekton-pipelines
# NOTA: usa metadata.name fijo — generateName no funciona con kubectl apply
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: build-and-deploy-run-1    # cambiar a run-2, run-3... en cada relanzamiento
  namespace: tekton-pipelines     # o borrar el anterior: kubectl delete pipelinerun build-and-deploy-run-1 -n tekton-pipelines
spec:
  pipelineRef:
    name: build-and-deploy
  params:
    - name: repo-url
      value: "https://github.com/USUARIO/mi-repo"   # <- cambiar por tu repo GitHub
    - name: revision
      value: main
    - name: image
      value: "USUARIO/mi-tienda:v1"                 # <- cambiar por tu usuario Docker Hub
  workspaces:
    - name: shared-source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: nfs-csi
          resources:
            requests:
              storage: 500Mi
