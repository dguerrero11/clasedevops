---
# FORMA 2: Montar ConfigMap como archivos en un volumen
# Cada clave del ConfigMap se convierte en un archivo dentro del Pod.
# VENTAJA: los cambios al ConfigMap se reflejan en el Pod (con delay ~1min)
#          sin necesidad de reiniciar el Pod (a diferencia de env vars)
apiVersion: v1
kind: Pod
metadata:
  name: pod-config-vol
  namespace: bootcamp
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "=== Archivos montados desde ConfigMap ==="
          ls -la /etc/app-config/
          echo ""
          echo "--- Contenido de app.properties ---"
          cat /etc/app-config/app.properties
          echo ""
          echo "--- Contenido de nginx.conf ---"
          cat /etc/app-config/nginx.conf
          sleep 3600
      volumeMounts:
        - name: config-volume
          mountPath: /etc/app-config
          readOnly: true

  volumes:
    - name: config-volume
      configMap:
        name: app-config
        # Opcional: montar solo ciertas claves
        # items:
        #   - key: app.properties
        #     path: app.properties
