---
# ============================================================
# EJERCICIO INTEGRADOR CLASE 2
# Stack completo: Frontend + PostgreSQL con storage NFS dinámico
#
# Recursos usados:
#   Namespace, ConfigMap, Secret (Clase 1)
#   StorageClass NFS CSI, StatefulSet + PVC, Deployment, Service (Clase 2)
#   Init Container para esperar la DB (Clase 1 avanzado)
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: clase2
  labels:
    bootcamp: "clase2"
    tema: storage

---
# Configuración no sensible
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: clase2
data:
  DB_HOST: "postgres-headless"
  DB_PORT: "5432"
  DB_NAME: "bootcamp"
  APP_ENV: "demo"

---
# Credenciales de la base de datos
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: clase2
type: Opaque
data:
  DB_USER: YWRtaW4=              # admin
  DB_PASSWORD: Ym9vdGNhbXAxMjM=  # bootcamp123

---
# Headless Service para StatefulSet PostgreSQL
# clusterIP: None → DNS directo a cada pod por nombre
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: clase2
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      name: postgres

---
# Service normal para que el frontend acceda a postgres
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: clase2
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# StatefulSet PostgreSQL con PVC dinámico NFS
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: clase2
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "bootcamp"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "admin", "-d", "bootcamp"]
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

  # Cada pod de postgres obtiene su propio PVC en NFS
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-csi
        resources:
          requests:
            storage: 1Gi

---
# Deployment del Frontend con Init Container
# El Init Container espera a que PostgreSQL esté disponible
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: clase2
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Esperando que PostgreSQL esté disponible..."
              until nc -z postgres-headless 5432; do
                echo "PostgreSQL no disponible todavía, reintentando en 5s..."
                sleep 5
              done
              echo "PostgreSQL está listo. Iniciando frontend."

      containers:
        - name: frontend
          image: nginx:1.25
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: app-config
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---
# Service NodePort para acceder al frontend desde fuera
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: clase2
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30091
