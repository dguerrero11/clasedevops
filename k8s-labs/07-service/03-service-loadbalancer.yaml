---
# TIPO LoadBalancer: solicita un IP externo al proveedor de cloud (AWS, GCP, Azure)
# En clusters locales (kubeadm/kind/minikube) puede quedarse en <pending>
# a menos que se use MetalLB u otro controlador.
apiVersion: v1
kind: Service
metadata:
  name: frontend-loadbalancer
  namespace: bootcamp
  annotations:
    # Ejemplo de anotación para AWS ELB:
    # service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
