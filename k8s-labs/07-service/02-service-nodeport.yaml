---
# TIPO NodePort: expone el servicio en un puerto de cada nodo (30000-32767)
# Acceso: http://<IP-del-nodo>:<nodePort>
# Útil para: desarrollo, demos, acceso directo sin ingress
apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: bootcamp
spec:
  type: NodePort
  selector:
    app: nginx                # Apunta al deployment del lab 06
  ports:
    - name: http
      protocol: TCP
      port: 80                # Puerto interno del cluster
      targetPort: 80          # Puerto del contenedor
      nodePort: 30080         # Puerto expuesto en el nodo (omitir para asignación automática)
